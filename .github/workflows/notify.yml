name: Avisar lesson plans listos
on:
  push:
    branches: [main]
    paths:
      - 'lesson-plans/**'
permissions:
  issues: write
jobs:
  avisar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const added = (context.payload.commits || []).flatMap(c => (c.added || []).concat(c.modified || []));
            const txt = added.find(f => f.endsWith('PARA-COPIAR.txt'));
            const base = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo;
            const link = txt ? (base + '/blob/main/' + txt) : (base + '/tree/main/lesson-plans');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Lesson plans listos - ' + new Date().toISOString().slice(0,10),
              body: '@jona2422 Los lesson plans de la proxima semana ya estan en el repo. Abre el archivo para copiar (texto plano para RenWeb o Word) aqui: ' + link
            });
