name: Avisar lesson plans listos
on:
  pull_request:
    types: [opened]
permissions:
  pull-requests: write
jobs:
  avisar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "@jona2422 Los lesson plans de la proxima semana estan listos para revisar. Abre el archivo PARA-COPIAR.txt de este PR y mergealo para avanzar ESTADO.md. " + context.payload.pull_request.html_url
            });
